name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

# Build + npm publish are delegated to the org-shared reusable workflow so
# the publish flow (and npm auth pattern) live in one place. Requires the
# NPM_TOKEN secret (inherited).
jobs:
  publish:
    uses: Provable-Games/.github/.github/workflows/publish-npm.yml@v1
    secrets: inherit
