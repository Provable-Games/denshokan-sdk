name: PR CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      sdk: ${{ steps.filter.outputs.sdk }}
      infra_ci: ${{ steps.filter.outputs.infra_ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sdk:
              - "src/**"
              - "tests/**"
              - "package.json"
              - "bun.lock"
              - "tsconfig.json"
              - "tsup.config.ts"
            infra_ci:
              - ".github/workflows/**"
              - ".github/prompts/**"

  infra-validate:
    needs: changes
    if: needs.changes.outputs.infra_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflow YAML
        run: |
          YAML_CLI="yaml@2.8.1"
          for file in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -f "$file" ] || continue
            npx -y "$YAML_CLI" valid < "$file"
          done

  # Always runs: `test` is a required status check, so it must report on
  # every PR (a conditional skip leaves the required check pending and
  # blocks merge on docs/CI-only PRs).
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build

  # AI code review (Claude + Codex) is delegated to the org-shared reusable
  # workflow so the review logic and model config live in one place. This
  # repo supplies only .github/review-agents.json + .github/prompts/*.md.
  review:
    uses: Provable-Games/.github/.github/workflows/code-review.yml@v1
    # Repo default workflow token is read-only; a reusable workflow's job
    # permissions can't exceed the caller's, so grant the write scopes the
    # review jobs need (PR comments + Claude OIDC) here.
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write
    secrets: inherit
